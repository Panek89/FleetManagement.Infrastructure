variables:
  - group: Terraform_Backend
  - group: FleetManagement_Infrastructure

trigger:
  - main

pool:
  vmImage: "ubuntu-latest"

steps:
  - task: AzureCLI@2
    displayName: "Debug: Display Variable Groups"
    inputs:
      azureSubscription: "$(azurerm_service_connection)"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        echo "Check pre-installed Terraform version:"
        terraform --version
        which terraform
        echo "----------------------------------------------------"
        echo "Backend Variables (Group ID 1):"
        az pipelines variable-group show --group-id 1 --output table
        echo "----------------------------------------------------"
        echo "Fleet Management Variables (Group ID 2):"
        az pipelines variable-group show --group-id 2 --output table

  - task: TerraformInstaller@1
    inputs:
      terraformVersion: "latest"

  - task: Bash@3
    displayName: "Verify Terraform Installation"
    inputs:
      targetType: "inline"
      script: |
        echo "Check installed terraform version: $(terraform -version)"

  - task: Bash@3
    displayName: "Debug: List Infrastructure folder"
    inputs:
      targetType: "inline"
      script: |
        echo "=== Actual working directory (PWD) ==="
        pwd

        echo "=== Content of main directory ==="
        ls -la $(System.DefaultWorkingDirectory)

  - task: TerraformTaskV4@4
    displayName: "Terraform Init"
    inputs:
      provider: "azurerm"
      command: "init"
      backendServiceArm: "$(azurerm_service_connection)"
      backendAzureRmResourceGroupName: "$(resource_group_name)"
      backendAzureRmStorageAccountName: "$(asa_name)"
      backendAzureRmContainerName: "$(asa_bs_name)"
      backendAzureRmKey: "fleetmanagement-infrastructure.tfstate"

  - task: TerraformTaskV4@4
    displayName: "Terraform Plan"
    inputs:
      provider: "azurerm"
      command: "plan"
      environmentServiceNameAzureRM: "$(azurerm_service_connection)"
    env:
      TF_VAR_shared_resource_group_name: "$(fm_resource_group_name)"
      TF_VAR_location: "$(fm_location)"
      TF_VAR_env_suffix: "$(fm_default-env-suffix)"
      TF_VAR_mssql_server_name: "$(fm_mssql_server_name)"
      TF_VAR_fm_suffix: "$(fm_suffix)"

  - task: TerraformTaskV4@4
    displayName: "Terraform Apply"
    inputs:
      provider: "azurerm"
      command: "apply"
      environmentServiceNameAzureRM: "$(azurerm_service_connection)"
    env:
      TF_VAR_shared_resource_group_name: "$(fm_resource_group_name)"
      TF_VAR_location: "$(fm_location)"
      TF_VAR_env_suffix: "$(fm_default-env-suffix)"
      TF_VAR_mssql_server_name: "$(fm_mssql_server_name)"
      TF_VAR_fm_suffix: "$(fm_suffix)"
